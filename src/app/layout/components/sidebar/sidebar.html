<aside class="sidebar">
  <div class="brand">
    <div class="logo">💅</div>
    <h2>Kathy's Nails</h2>
    <p>Centro de Belleza</p>
  </div>

  <div class="divider"></div>

  <nav class="menu">
    <a routerLink="/dashboard" routerLinkActive="active">
      <i class="fa-solid fa-house"></i>
      <span>Dashboard</span>
    </a>

    <a routerLink="/calculator" routerLinkActive="active">
      <i class="fa-solid fa-calculator"></i>
      <span>Calculadora</span>
    </a>

    <a routerLink="/appointments" routerLinkActive="active">
      <i class="fa-solid fa-calendar-days"></i>
      <span>Citas</span>
    </a>

    <a routerLink="/clients" routerLinkActive="active">
      <i class="fa-solid fa-users"></i>
      <span>Clientes</span>
    </a>

    <div class="section-title">Administración</div>

    <a routerLink="/service-categories" routerLinkActive="active">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categorías</span>
    </a>

    <a routerLink="/services" routerLinkActive="active">
      <i class="fa-solid fa-spa"></i>
      <span>Servicios</span>
    </a>

    <a routerLink="/materials" routerLinkActive="active">
      <i class="fa-solid fa-box"></i>
      <span>Materiales</span>
    </a>

    <a routerLink="/service-materials" routerLinkActive="active">
      <i class="fa-solid fa-bottle-droplet"></i>
      <span>Materiales Servicio</span>
    </a>

    <div class="section-title">Finanzas</div>

    <a routerLink="/invoices" routerLinkActive="active">
      <i class="fa-solid fa-file-invoice-dollar"></i>
      <span>Facturas</span>
    </a>

    <a routerLink="/reports" routerLinkActive="active">
      <i class="fa-solid fa-chart-pie"></i>
      <span>Reportes</span>
    </a>

    <a routerLink="/settings" routerLinkActive="active">
      <i class="fa-solid fa-gear"></i>
      <span>Configuración</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <button type="button" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Cerrar sesión</span>
    </button>
  </div>
</aside>
