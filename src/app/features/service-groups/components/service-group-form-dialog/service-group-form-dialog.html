<h2 mat-dialog-title>
  {{ data ? 'Editar Grupo' : 'Nuevo Grupo' }}
</h2>

<div mat-dialog-content>
  <form [formGroup]="form" class="form">
    <div class="form-group">
      <label>Nombre del grupo</label>

      <input
        formControlName="name"
        placeholder="Técnicas, Extras, Tratamientos..."
      />

      <small
        *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
      >
        El nombre es obligatorio.
      </small>
    </div>

    <div class="form-group">
      <label>Categoría</label>

      <select formControlName="category_id">
        <option value="">Selecciona una categoría</option>

        <option
          *ngFor="let category of categories"
          [value]="category.id"
        >
          {{ category.icon || '' }} {{ category.name }}
        </option>
      </select>

      <small
        *ngIf="
          form.get('category_id')?.invalid &&
          form.get('category_id')?.touched
        "
      >
        La categoría es obligatoria.
      </small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Icono</label>

        <input
          formControlName="icon"
          placeholder="💅"
        />
      </div>

      <div class="form-group">
        <label>Orden</label>

        <input
          type="number"
          formControlName="sort"
          placeholder="1"
        />
      </div>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" formControlName="multiple" />
        Permite múltiples opciones
      </label>

      <label>
        <input type="checkbox" formControlName="required" />
        Es obligatorio
      </label>

      <label>
        <input type="checkbox" formControlName="adds_price" />
        Suma al precio
      </label>

      <label>
        <input type="checkbox" formControlName="is_active" />
        Activo
      </label>
    </div>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button
    class="btn-cancel"
    type="button"
    (click)="close()"
  >
    Cancelar
  </button>

  <button
    class="btn-save"
    type="button"
    (click)="save()"
  >
    Guardar
  </button>
</div>
