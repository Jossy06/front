<div class="services-page">
  <app-page-header
    title="Servicios"
    description="Servicios de Katty's Nails."
    icon="💅"
  >
    <button class="btn-primary" (click)="openCreateForm()">
      <i class="fa-solid fa-plus"></i>
      Nuevo Servicio
    </button>
  </app-page-header>

  <div class="toolbar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>

      <input
        type="text"
        placeholder="Buscar servicio..."
        [(ngModel)]="search"
        (keyup)="filterServices()"
      />
    </div>
  </div>

  <div class="loading" *ngIf="loading">
    Cargando servicios...
  </div>

  <div class="table-card" *ngIf="!loading">
    <table mat-table [dataSource]="paginatedServices">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Servicio</th>
        <td mat-cell *matCellDef="let service">
          <strong>{{ service.name }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let service">
          {{ service.description || 'Sin descripción' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="base_price">
        <th mat-header-cell *matHeaderCellDef>Precio base</th>
        <td mat-cell *matCellDef="let service">
          ${{ service.base_price }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let service">
          <div class="actions">
            <button
              class="action edit"
              matTooltip="Editar servicio"
              (click)="openEditForm(service)"
            >
              <i class="fa-solid fa-pen"></i>
            </button>

            <button
              class="action delete"
              matTooltip="Eliminar servicio"
              (click)="deleteService(service)"
            >
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
      ></tr>
    </table>

    <app-empty-state
      *ngIf="filteredServices.length === 0"
      message="No existen servicios registrados."
    ></app-empty-state>

    <div class="custom-paginator" *ngIf="filteredServices.length > 0">
      <span>
        Mostrando {{ startItem }}-{{ endItem }} de
        {{ totalItems }} servicios
      </span>

      <div class="pagination-buttons">
        <button
          type="button"
          (click)="previousPage()"
          [disabled]="currentPage === 1"
        >
          <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button
          type="button"
          *ngFor="let page of pages"
          [class.active]="page === currentPage"
          (click)="goToPage(page)"
        >
          {{ page }}
        </button>

        <button
          type="button"
          (click)="nextPage()"
          [disabled]="currentPage === totalPages"
        >
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
</div>
